services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ..
      dockerfile: smart-handicap-sign/backend/dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://postgres:postgres@db:5432/shs
      CORS_ORIGIN: http://localhost:3000,http://localhost:8081,https://tqr9vxj0-8081.usw3.devtunnels.ms
      FRONTEND_URL: https://tqr9vxj0-8081.usw3.devtunnels.ms
      WORKOS_REDIRECT_URI: https://tqr9vxj0-8081.usw3.devtunnels.ms/api/v1/auth/callback
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      proxy-net:
        aliases:
          - shs-backend

  frontend:
    build:
      context: ..
      dockerfile: smart-handicap-sign/frontend/dockerfile
      args:
        EXPO_PUBLIC_API_URL: "http://localhost:8000"
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      default:
      proxy-net:
        aliases:
          - shs-frontend

volumes:
  pgdata:
  redis_data:

networks:
  proxy-net:
    external: true
