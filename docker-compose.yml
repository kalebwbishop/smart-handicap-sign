services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://postgres:postgres@db:5432/shs
      CORS_ORIGIN: https://shs.deploy-box.com
      FRONTEND_URL: https://shs.deploy-box.com
      WORKOS_REDIRECT_URI: https://shs.deploy-box.com/api/v1/auth/callback
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      proxy-net:
        aliases:
          - shs-backend

  frontend:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      default:
      proxy-net:
        aliases:
          - shs-frontend

volumes:
  pgdata:
  redis_data:

networks:
  proxy-net:
    external: true
