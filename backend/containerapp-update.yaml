properties:
  template:
    containers:
      - name: myapp
        image: docker.io/kalebwbishop/shs:2
        resources:
          cpu: 0.25
          memory: 0.5Gi
        probes:
          - type: Startup
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 60
            tcpSocket:
              port: 8000
          - type: Readiness
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
            tcpSocket:
              port: 8000
          - type: Liveness
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
            tcpSocket:
              port: 8000