$kind: http-request
description: |-
  Retrieve a specific event by ID.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/events/{{event_id}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      try {
        const data = pm.response.json();
        if (data.id) pm.collectionVariables.set('event_id', data.id);
      } catch (error) {}
    language: text/javascript
order: 3000
