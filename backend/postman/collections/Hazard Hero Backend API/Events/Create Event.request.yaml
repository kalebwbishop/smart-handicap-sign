$kind: http-request
description: |-
  Create a new event for a sign, optionally creating a notification.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/events"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "sign_id": "{{sign_id}}",
      "type": "alert",
      "data": {
        "previous_status": "available",
        "new_status": "assistance_requested"
      },
      "create_notification": true,
      "notification_title": "Assistance Requested",
      "notification_body": "A wave gesture was detected."
    }
scripts:
  - type: afterResponse
    code: |-
      try {
        const data = pm.response.json();
        if (data.id) pm.collectionVariables.set('event_id', data.id);
      } catch (error) {}
    language: text/javascript
order: 2000
