$kind: http-request
description: |-
  Retrieve events with optional filtering, scoped to the user's organizations.

  Query params:
  - `sign_id`: Filter by sign ID (optional)
  - `type`: Filter by event type (optional)
  - `skip` (optional)
  - `limit` (optional)

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/events"
method: GET
order: 1000
