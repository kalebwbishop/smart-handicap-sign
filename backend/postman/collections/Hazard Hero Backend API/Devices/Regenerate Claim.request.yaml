$kind: http-request
description: |-
  Generate a new claim ID for an unclaimed device. Requires admin or owner role.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/devices/{{serial_number}}/regenerate-claim"
method: POST
scripts:
  - type: afterResponse
    code: >-
      try {
        const data = pm.response.json();
        if (data.claim_id) pm.collectionVariables.set('claim_id', data.claim_id);
      } catch (error) {}
    language: text/javascript
order: 9000
