$kind: http-request
description: |-
  List devices scoped to the current user's organizations.

  Query params:
  - `organization_id`: Filter by organization (optional)
  - `lifecycle_status`: Filter by lifecycle status (optional)
  - `skip` (optional)
  - `limit` (optional)

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/devices"
method: GET
order: 1000
