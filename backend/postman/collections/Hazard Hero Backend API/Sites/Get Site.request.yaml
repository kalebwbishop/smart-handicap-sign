$kind: http-request
description: |-
  Retrieve a specific site by ID. Requires org membership.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/sites/{{site_id}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      try {
        const data = pm.response.json();
        if (data.id) {
          pm.collectionVariables.set('site_id', data.id);
          pm.collectionVariables.set('new_site_id', data.id);
        }
      } catch (error) {}
    language: text/javascript
order: 3000
