$kind: http-request
description: |-
  Create a new site. Requires admin or owner role in the target organization.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/sites"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "organization_id": "{{organization_id}}",
      "name": "Main Garage",
      "address_line_1": "123 Main St",
      "city": "Springfield",
      "state": "IL",
      "postal_code": "62701",
      "country": "US",
      "jurisdiction": "Springfield"
    }
scripts:
  - type: afterResponse
    code: |-
      try {
        const data = pm.response.json();
        if (data.id) {
          pm.collectionVariables.set('site_id', data.id);
          pm.collectionVariables.set('new_site_id', data.id);
        }
      } catch (error) {}
    language: text/javascript
order: 2000
