name: Hazard Hero Backend API
description: >-
  Postman collection for the FastAPI backend. Generated from the backend OpenAPI
  schema and route definitions.


  Notes:

  - User-authenticated requests use the collection bearer token
  `{{access_token}}`.

  - `POST /api/v1/inference/classify` uses device auth via `Authorization:
  Bearer {{serial_number}}:{{device_token}}`.

  - The backend is configured with `redirect_slashes=False`, so trailing slashes
  return 404.

  - Exchange and refresh requests update the saved collection tokens
  automatically.
