$kind: http-request
description: |-
  Create a new notification for the current user.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/notifications"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "event_id": "{{event_id}}",
      "title": "Assistance Requested",
      "body": "Space A12 needs assistance.",
      "read": false
    }
scripts:
  - type: afterResponse
    code: |-
      try {
        const data = pm.response.json();
        if (data.id) pm.collectionVariables.set('notification_id', data.id);
      } catch (error) {}
    language: text/javascript
order: 2000
