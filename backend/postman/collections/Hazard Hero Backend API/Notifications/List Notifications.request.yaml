$kind: http-request
description: >-
  Retrieve notifications for the current user with optional filtering.


  Query params:

  - `device_event_id`: Filter by device event ID (optional)

  - `read`: Filter by read status (optional)

  - `after`: Return notifications created after this date/time (ISO 8601)
  (optional)

  - `skip` (optional)

  - `limit` (optional)


  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/notifications"
method: GET
order: 1000
