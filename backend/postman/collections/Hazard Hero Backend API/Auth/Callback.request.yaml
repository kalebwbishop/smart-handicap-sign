$kind: http-request
description: |-
  Redirect to the frontend (or mobile deep-link) with the authorization code.

  Query params:
  - `code` (optional)
  - `state` (optional)

  Auth: None
url: "{{base_url}}/api/v1/auth/callback?code={{oauth_code}}&state={{oauth_state}}"
method: GET
auth:
  type: noauth
order: 2000
