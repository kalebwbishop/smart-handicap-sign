$kind: http-request
description: |-
  Return the authenticated user's profile.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/auth/me"
method: GET
scripts:
  - type: afterResponse
    code: >-
      try {
        const data = pm.response.json();
        if (data.user && data.user.id) pm.collectionVariables.set('user_id', data.user.id);
      } catch (error) {}
    language: text/javascript
order: 5000
