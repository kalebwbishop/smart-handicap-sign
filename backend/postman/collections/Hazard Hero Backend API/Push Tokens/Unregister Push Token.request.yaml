$kind: http-request
description: |-
  Unregister an Expo push token.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/push-tokens"
method: DELETE
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "expo_push_token": "{{expo_push_token}}"
    }
order: 2000
