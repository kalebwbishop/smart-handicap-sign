$kind: http-request
description: |-
  Get a single parking space by ID.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/parking-spaces/{{parking_space_id}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      try {
        const data = pm.response.json();
        if (data.id) {
          pm.collectionVariables.set('parking_space_id', data.id);
          pm.collectionVariables.set('new_parking_space_id', data.id);
        }
      } catch (error) {}
    language: text/javascript
order: 3000
