$kind: http-request
description: |-
  Update a parking space (admin/owner only).

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/parking-spaces/{{parking_space_id}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "label": "A12",
      "accessible_type": "reserved",
      "notes": "Reserved for maintenance"
    }
order: 4000
