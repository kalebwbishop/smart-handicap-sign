$kind: http-request
description: |-
  Create a parking space within a site (admin/owner/installer).

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/sites/{{site_id}}/parking-spaces"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "label": "A12",
      "accessible_type": "van_accessible",
      "latitude": 39.7817,
      "longitude": -89.6501,
      "notes": "Near east entrance"
    }
scripts:
  - type: afterResponse
    code: |-
      try {
        const data = pm.response.json();
        if (data.id) {
          pm.collectionVariables.set('parking_space_id', data.id);
          pm.collectionVariables.set('new_parking_space_id', data.id);
        }
      } catch (error) {}
    language: text/javascript
order: 2000
