$kind: http-request
description: |-
  Add a member by email. Requires owner or admin role.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/organizations/{{organization_id}}/members"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "member@example.com",
      "role": "member"
    }
order: 7000
