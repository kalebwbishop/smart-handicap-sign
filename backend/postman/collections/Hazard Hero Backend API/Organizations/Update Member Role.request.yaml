$kind: http-request
description: |-
  Update a member's role. Requires owner (or admin for non-owner changes).

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/organizations/{{organization_id}}/members/{{user_id}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "role": "admin"
    }
order: 8000
