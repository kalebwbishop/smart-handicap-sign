description: |-
  Update organization details. Requires owner or admin role.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/organizations/{{organization_id}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Renamed Organization"
    }
order: 4000
