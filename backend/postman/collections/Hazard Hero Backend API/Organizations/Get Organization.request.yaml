$kind: http-request
description: |-
  Get organization details. Must be a member.

  Auth: Bearer `{{access_token}}`
url: "{{base_url}}/api/v1/organizations/{{organization_id}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      try {
        const data = pm.response.json();
        if (data.id) {
          pm.collectionVariables.set('organization_id', data.id);
          pm.collectionVariables.set('customer_id', data.id);
        }
      } catch (error) {}
    language: text/javascript
order: 3000
