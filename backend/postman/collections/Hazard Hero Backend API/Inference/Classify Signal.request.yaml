$kind: http-request
description: |-
  Classify a signal matching the configured sample count as **wave** or **non-wave**.

  Requires device authentication via ``Authorization: Bearer <serial>:<token>``.
  The device can only submit telemetry for its own serial number.

  Query params:
  - `debug`: Include a base64-encoded debug graph of the input signal (optional)

  Auth: Header `Authorization: Bearer {{serial_number}}:{{device_token}}`
url: "{{base_url}}/api/v1/inference/classify?debug=false"
method: POST
headers:
  Authorization: Bearer {{serial_number}}:{{device_token}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "serial_number": "{{serial_number}}",
      "samples": {{wave_samples_json}}
    }
auth:
  type: noauth
order: 1000
