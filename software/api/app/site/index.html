<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>

    <h1>Users</h1>
    <div style="display: flex; gap: 2em; align-items: flex-start;">
        <div>
            <h2>Active Users</h2>
            <table id="active-users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Created At</th>
                        <th>Updated At</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div style="display: flex; flex-direction: column; gap: 1em; justify-content: center; align-items: center;">
            <button id="move-to-inactive" title="Move to Inactive" style="font-size:2em">&#8594;</button>
            <button id="move-to-active" title="Move to Active" style="font-size:2em">&#8592;</button>
        </div>
        <div>
            <h2>Inactive Users</h2>
            <table id="inactive-users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Created At</th>
                        <th>Updated At</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div style="margin-top: 2em; max-width: 400px;">
        <h2>Add New User</h2>
        <form id="add-user-form">
            <div style="margin-bottom: 1em;">
                <label for="new-user-name">Name:</label><br>
                <input type="text" id="new-user-name" name="name" required style="width: 100%;">
            </div>
            <div style="margin-bottom: 1em;">
                <label for="new-user-email">Email:</label><br>
                <input type="email" id="new-user-email" name="email" required style="width: 100%;">
            </div>
            <button type="submit">Add User</button>
        </form>
        <div id="add-user-message" style="margin-top: 1em; color: green;"></div>
    </div>

    <div id="edit-user-section" style="margin-top: 2em; max-width: 400px; display: none;">
        <h2>Edit Selected User</h2>
        <form id="edit-user-form">
            <div style="margin-bottom: 1em;">
                <label for="edit-user-name">Name:</label><br>
                <input type="text" id="edit-user-name" name="name" required style="width: 100%;">
            </div>
            <div style="margin-bottom: 1em;">
                <label for="edit-user-email">Email:</label><br>
                <input type="email" id="edit-user-email" name="email" required style="width: 100%;">
            </div>
            <button type="submit">Update User</button>
            <button type="button" id="delete-user-btn" style="margin-left: 1em; color: red;">Delete User</button>
        </form>
        <div id="edit-user-message" style="margin-top: 1em; color: green;"></div>
    </div>
    <script>
    let activeUsers = [];
    let inactiveUsers = [];
    let selectedUser = { table: null, index: null };

        function renderTable(users, tableId) {
            const tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = '';
            users.forEach((user, idx) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.created_at}</td>
                    <td>${user.updated_at}</td>
                `;
                row.onclick = () => {
                    selectedUser = { table: tableId, index: idx };
                    highlightSelection();
                    showEditUserSection();
                };
                if (selectedUser.table === tableId && selectedUser.index === idx) {
                    row.style.background = '#d0eaff';
                }
                tbody.appendChild(row);
            });
        }

        function highlightSelection() {
            renderTable(activeUsers, 'active-users-table');
            renderTable(inactiveUsers, 'inactive-users-table');
        }

        function showEditUserSection() {
            const section = document.getElementById('edit-user-section');
            const form = document.getElementById('edit-user-form');
            const messageDiv = document.getElementById('edit-user-message');
            messageDiv.textContent = '';
            if (selectedUser.table && selectedUser.index !== null) {
                section.style.display = '';
                let user = selectedUser.table === 'active-users-table' ? activeUsers[selectedUser.index] : inactiveUsers[selectedUser.index];
                document.getElementById('edit-user-name').value = user.name;
                document.getElementById('edit-user-email').value = user.email;
                form.onsubmit = function(e) {
                    e.preventDefault();
                    const name = document.getElementById('edit-user-name').value.trim();
                    const email = document.getElementById('edit-user-email').value.trim();
                    if (!name || !email) {
                        messageDiv.style.color = 'red';
                        messageDiv.textContent = 'Name and email are required.';
                        return;
                    }
                    fetch(`/users?id=eq.${user.id}`, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ name, email })
                    })
                    .then(response => {
                        if (!response.ok) throw new Error('Failed to update user');
                        return response.json();
                    })
                    .then(data => {
                        messageDiv.style.color = 'green';
                        messageDiv.textContent = 'User updated successfully!';
                        fetchUsers();
                    })
                    .catch(error => {
                        messageDiv.style.color = 'red';
                        messageDiv.textContent = 'Error updating user.';
                    });
                };
                document.getElementById('delete-user-btn').onclick = function() {
                    if (confirm('Are you sure you want to delete this user?')) {
                        fetch(`/users?id=eq.${user.id}`, {
                            method: 'DELETE'
                        })
                        .then(response => {
                            if (!response.ok) throw new Error('Failed to delete user');
                            messageDiv.style.color = 'green';
                            messageDiv.textContent = 'User deleted successfully!';
                            selectedUser = { table: null, index: null };
                            section.style.display = 'none';
                            fetchUsers();
                        })
                        .catch(error => {
                            messageDiv.style.color = 'red';
                            messageDiv.textContent = 'Error deleting user.';
                        });
                    }
                };
            } else {
                section.style.display = 'none';
            }
        }

        function moveUser(from, to) {
            if (selectedUser.table === from && selectedUser.index !== null) {
                const user = (from === 'active-users-table' ? activeUsers : inactiveUsers)[selectedUser.index];
                // PATCH request to update active status
                fetch(`/users?id=eq.${user.id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email_is_active: from !== 'active-users-table' })
                })
                .then(response => {
                    if (!response.ok) throw new Error('Failed to update user status');
                    selectedUser = { table: null, index: null };
                    fetchUsers();
                })
                .catch(error => {
                    alert('Error updating user status.');
                });
            }
        }

    document.getElementById('move-to-inactive').onclick = () => moveUser('active-users-table', 'inactive-users-table');
    document.getElementById('move-to-active').onclick = () => moveUser('inactive-users-table', 'active-users-table');

        function fetchUsers() {
            fetch('/users')
                .then(response => response.json())
                .then(users => {
                    activeUsers = users.filter(u => u.email_is_active);
                    inactiveUsers = users.filter(u => !u.email_is_active);
                    highlightSelection();
                    showEditUserSection();
                })
                .catch(error => {
                    document.querySelector('#active-users-table tbody').innerHTML = `<tr><td colspan="5">Error loading users.</td></tr>`;
                    document.querySelector('#inactive-users-table tbody').innerHTML = `<tr><td colspan="5">Error loading users.</td></tr>`;
                });
        }
        fetchUsers();

        document.getElementById('add-user-form').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('new-user-name').value.trim();
            const email = document.getElementById('new-user-email').value.trim();
            const messageDiv = document.getElementById('add-user-message');
            messageDiv.style.color = 'green';
            messageDiv.textContent = '';
            if (!name || !email) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Name and email are required.';
                return;
            }
            fetch('/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, email })
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to add user');
            })
            .then(() => {
                messageDiv.textContent = 'User added successfully!';
                document.getElementById('add-user-form').reset();
                fetchUsers();
            })
            .catch(error => {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Error adding user.';
            });
        };
    </script>
</body>
</html>
