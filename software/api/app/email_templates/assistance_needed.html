<!DOCTYPE html>
<html lang="en">
<head>

        body {

            background-color: #f7f8fa;
            color: #333;
            padding: 30px;
        }
        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            max-width: 500px;
            margin: auto;
            padding: 30px;
        }
        h2 {
            color: #0057b8;
        }

            margin-top: 20px;
            font-size: 1.1em;
        }

<body>
    <div class="container">
        <h2>Assistance Needed</h2>
        <div class="message">
