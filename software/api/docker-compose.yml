version: "3.9"

services:
  postgrest:
    image: postgrest/postgrest:latest
    container_name: shs_postgrest
    ports:
      - "3000:3000"
    volumes:
      # Mount your config file from the host
      - ./postgrest.conf:/etc/postgrest/postgrest.conf:ro
    command: ["postgrest", "/etc/postgrest/postgrest.conf"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
